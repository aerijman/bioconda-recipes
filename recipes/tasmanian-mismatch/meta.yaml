{% set name = "tasmanian-mismatch" %}
{% set version = "2.0.0" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://github.com/nebiolabs/{{ name }}/archive/v{{ version }}.tar.gz
  sha256: d7d5694559a5cdd3f61b41ca7d4aac8d4b4ebecfaba22ba84890aa90b8452b1e

build:
  number: 0
  run_exports:
    - {{ pin_subpackage('tasmanian-mismatch', max_pin='x') }}
  script: |
    set -euxo pipefail

    export CARGO_PROFILE_RELEASE_LTO=false

    # Determine cargo target triple used for env var names (cc-rs convention)
    export TARGET="${TARGET:-$(rustc -vV | sed -n 's/^host: //p')}"
    target_env="${TARGET//-/_}"

    # Only set toolchain vars if they exist (avoid exporting empty strings)
    if [[ -n "${CC:-}" ]]; then
      export "CC_${target_env}=${CC}"
    fi
    if [[ -n "${CXX:-}" ]]; then
      export "CXX_${target_env}=${CXX}"
    fi
    if [[ -n "${AR:-}" ]]; then
      export "AR_${target_env}=${AR}"
    fi
    if [[ -n "${RANLIB:-}" ]]; then
      export "RANLIB_${target_env}=${RANLIB}"
    fi

    if [[ -n "${CFLAGS:-}" ]]; then
      export "CFLAGS_${target_env}=${CFLAGS}"
    fi
    if [[ -n "${CXXFLAGS:-}" ]]; then
      export "CXXFLAGS_${target_env}=${CXXFLAGS}"
    fi
    if [[ -n "${LDFLAGS:-}" ]]; then
      export "LDFLAGS_${target_env}=${LDFLAGS}"
    fi

    cargo-bundle-licenses --format yaml --output THIRDPARTY.yml
    cargo build --release --locked

    install -Dm755 target/release/tasmanian-mismatch        "$PREFIX/bin/tasmanian-mismatch"
    install -Dm755 target/release/tasmanian-diagnostics     "$PREFIX/bin/tasmanian-diagnostics"
    install -Dm755 target/release/tasmanian-rescale-quality "$PREFIX/bin/tasmanian-rescale-quality"

requirements:
  build:
    - {{ compiler('rust') }}
    - cargo-bundle-licenses
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - {{ stdlib('c') }}

    - clangdev
    - make
  run:
    - python >=3.10
    - bokeh >=3,<4
    - polars >=0.20,<2
    - pandas

test:
  commands:
    - tasmanian-mismatch --help
    - tasmanian-diagnostics --help
    - tasmanian-rescale-quality --help

about:
  home: "https://github.com/nebiolabs/tasmanian-mismatch"
  license: "LGPL-2.1-or-later"
  license_family: LGPL
  license_file:
    - LICENSE.txt
    - THIRDPARTY.yml
  summary: "Tasmanian tool to analyze mismatches in sequencing data (Rust + Python hybrid)."
  description: |
    Version 2.x is a Rust-based rewrite of tasmanian-mismatch.
    Some functionality relies on Python components, which are installed
    via Conda (pixi is not used in this environment).

    The original Python-only implementation is available in 1.x releases.
  dev_url: "https://github.com/nebiolabs/tasmanian-mismatch"

extra:
  recipe-maintainers:
    - aerijman
  skip-lints:
    - should_be_noarch_generic
