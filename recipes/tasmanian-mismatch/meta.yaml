{% set name = "tasmanian-mismatch" %}
{% set version = "2.0.0" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://github.com/nebiolabs/{{ name }}/archive/v{{ version }}.tar.gz
  sha256: d7d5694559a5cdd3f61b41ca7d4aac8d4b4ebecfaba22ba84890aa90b8452b1e

build:
  number: 0
  noarch: generic
  run_exports:
    - {{ pin_subpackage('tasmanian-mismatch', max_pin='x') }}
  script: |
    set -euxo pipefail

    export CARGO_PROFILE_RELEASE_LTO=false

    # Ensure cargo uses conda toolchain + flags
    export CC="${CC}"
    export CXX="${CXX}"
    export AR="${AR}"
    export RANLIB="${RANLIB}"
    export CFLAGS="${CFLAGS}"
    export CXXFLAGS="${CXXFLAGS}"
    export LDFLAGS="${LDFLAGS}"

    # Also provide target-qualified vars (these are what the log shows Cargo probing)
    export TARGET="${TARGET:-x86_64-unknown-linux-gnu}"
    export CC_x86_64_unknown_linux_gnu="${CC}"
    export CXX_x86_64_unknown_linux_gnu="${CXX}"
    export AR_x86_64_unknown_linux_gnu="${AR}"
    export RANLIB_x86_64_unknown_linux_gnu="${RANLIB}"
    export CFLAGS_x86_64_unknown_linux_gnu="${CFLAGS}"
    export CXXFLAGS_x86_64_unknown_linux_gnu="${CXXFLAGS}"
    export LDFLAGS_x86_64_unknown_linux_gnu="${LDFLAGS}"

    cargo build --release --locked -vv

    install -Dm755 target/release/tasmanian-mismatch        "$PREFIX/bin/tasmanian-mismatch"
    install -Dm755 target/release/tasmanian-diagnostics     "$PREFIX/bin/tasmanian-diagnostics"
    install -Dm755 target/release/tasmanian-rescale-quality "$PREFIX/bin/tasmanian-rescale-quality"

  requirements:
  build:
    - {{ compiler('rust') }}
    - cargo-bundle-licenses
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - {{ stdlib('c') }}
    - make
  run:
    - python >=3.10
    - bokeh >=3,<4
    - polars >=0.20,<2
    - pandas

test:
  commands:
    - tasmanian-mismatch --help
    - tasmanian-diagnostics --help
    - tasmanian-rescale-quality --help

about:
  home: "https://github.com/nebiolabs/tasmanian-mismatch"
  license: "LGPL-2.1-or-later"
  license_family: LGPL
  license_file: LICENSE.txt
  summary: "Tasmanian tool to analyze mismatches in sequencing data (Rust + Python hybrid)."
  description: |
    Version 2.x is a Rust-based rewrite of tasmanian-mismatch.
    Some functionality relies on Python components, which are installed
    via Conda (pixi is not used in this environment).

    The original Python-only implementation is available in 1.x releases.
  dev_url: "https://github.com/nebiolabs/tasmanian-mismatch"

extra:
  recipe-maintainers:
    - aerijman
